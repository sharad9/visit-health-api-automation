        #component;

        constructor(component) { this.#component = component; }
        set(key, value) {
            const element = this.#component.getElement();
            if (value === null || value === undefined) {
                delete this.#style[key];
                element.style.removeProperty(key);
            } else {
                this.#style[key] = value;
                element.style[key] = value;
            }
            return this;
        }
        get(key) { return this.#component.getElement().style[key]; }
        remove(key) { return this.set(key, null); }

    class Attribute {

    class Property {
        #component;
        constructor(component) { this.#component = component; }
        set(key, value) { this.#component.getElement()[key] = value; return this; }

    class Component {
        #element;
        #children = [];
        #style;
        #attribute;
        #property;

        constructor(tagName = 'div') {
            this.#element = document.createElement(tagName);
            this.#style = new Style(this);
            this.#attribute = new Attribute(this);
            this.#property = new Property(this);
        }

        addChild(child) {
            if (!child) return this;
            if (child instanceof Component) {
                this.#element.appendChild(child.getElement());
                this.#children.push(child);
            } else if (child instanceof Node) {
                this.#element.appendChild(child);
            }
            return this;
        }

        addChildren(...children) { children.forEach(child => this.addChild(child)); return this; }
        clearChildren() { this.#element.innerHTML = ''; this.#children = []; return this; }
        setText(text) { this.#element.textContent = text; return this; }
        addClass(name) { this.#element.classList.add(name); return this; }
        addEventListener(event, handler) { this.#element.addEventListener(event, handler); return this; }
        getElement() { return this.#element; }
        setStyle(key, value) { this.#style.set(key, value); return this; }

    function decodeEscapedText(value) {
        const text = String(value ?? '');
        if (!text) return '';
        return text
            .replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
            .replace(/\\r/g, '\r')
            .replace(/\\n/g, '\n')
            .replace(/\\t/g, '\t')
            .replace(/\\"/g, '"')
            .replace(/\\\\/g, '\\');
    }

    function safeJson(raw) {
        if (raw == null) return 'null';
        if (typeof raw === 'object') return JSON.stringify(raw, null, 2);
        const normalized = decodeEscapedText(raw).trim();
        if (!normalized) return '';
        try { return JSON.stringify(JSON.parse(normalized), null, 2); } catch (_) { return normalized; }
    }

    function tryParseJson(raw) {
        if (raw == null) return null;
        if (typeof raw === 'object') return raw;
        const normalized = decodeEscapedText(raw).trim();
        if (!normalized) return null;
        try { return JSON.parse(normalized); } catch (_) { return null; }
    }

    function isEmptyObject(value) {
        return value && typeof value === 'object' && !Array.isArray(value) && Object.keys(value).length === 0;

    function parseStructuredPayload(textValue) {
        const text = decodeEscapedText(textValue);
        const headerKey = 'Headers:\n';
        const bodyKey = '\n\nBody:\n';

        if (!text.includes(headerKey) || !text.includes(bodyKey)) {
            const rawObj = tryParseJson(text);
            const isMultipart = rawObj && rawObj.type === 'multipart/form-data';
            return {
                headers: '',
                body: safeJson(text),
                file: isMultipart ? safeJson(rawObj.file ?? null) : '',
                form: isMultipart ? (isEmptyObject(rawObj.form) ? '' : safeJson(rawObj.form ?? null)) : ''
            };
        }

        const headerStart = text.indexOf(headerKey) + headerKey.length;
        const bodyStart = text.indexOf(bodyKey);
        const headersText = text.substring(headerStart, bodyStart).trim();
        const bodyText = text.substring(bodyStart + bodyKey.length).trim();
        const bodyObject = tryParseJson(bodyText);
        const isMultipart = bodyObject && bodyObject.type === 'multipart/form-data';

        return {
            headers: safeJson(headersText),
            body: safeJson(bodyText),
            file: isMultipart ? safeJson(bodyObject.file ?? null) : '',
            form: isMultipart ? (isEmptyObject(bodyObject.form) ? '' : safeJson(bodyObject.form ?? null)) : ''
        };
    }

        const durationMs = extractDurationMs(step.status);

        return {
            index,
            name: step.name || `step-${index + 1}`,
            method: step.method || 'NA',
            url: step.url || 'NA',
            ok: !!step.ok,
            statusCode,
            durationMs,
            request,
            response,
            rawStatus: step.status || ''
        };
    });

            .setStyle(Style.Key.FLEX, '1')
            .setStyle(Style.Key.BORDER, '1px solid #e2e8f0')
            .setStyle(Style.Key.BORDER_RADIUS, '8px')

            .addChildren(
                new Div().setText(label).setStyle(Style.Key.FONT_SIZE, '11px').setStyle(Style.Key.FONT_WEIGHT, '700').setStyle(Style.Key.COLOR, '#64748b'),
                new Div().setText(String(value)).setStyle(Style.Key.FONT_SIZE, '20px').setStyle(Style.Key.FONT_WEIGHT, '800').setStyle(Style.Key.COLOR, color).setStyle(Style.Key.MARGIN_TOP, '4px')
            );
    }

    stats.addChildren(
        statCard('Total', summary.totalFlowSteps || 0, '#1e293b'),
        statCard('Executed', summary.total || 0, '#7c3aed'),

        .setStyle(Style.Key.FLEX, '1')

    const listRows = [];

    function renderTabsForStep(step) {
        tabsBar.getElement().innerHTML = '';
        tabContent.getElement().innerHTML = '';

        const tabs = [
            { id: 'meta', label: 'Meta', render: renderMeta },
            { id: 'reqHeaders', label: 'Request Headers', render: () => renderCodeSection('Request Headers', step.request.headers || '{}') },
            { id: 'reqBody', label: 'Request Body', render: () => renderCodeSection('Request Body', step.request.body || '') },
            { id: 'resHeaders', label: 'Response Headers', render: () => renderCodeSection('Response Headers', step.response.headers || '{}') },
            { id: 'resBody', label: 'Response Body', render: () => renderCodeSection('Response Body', step.response.body || '') }
        ];

        if (step.request.file) {
            tabs.splice(3, 0, { id: 'reqFile', label: 'Req File', render: () => renderCodeSection('Request File', step.request.file) });
        }
        if (step.request.form) {
            tabs.splice(step.request.file ? 4 : 3, 0, { id: 'reqForm', label: 'Req Form', render: () => renderCodeSection('Request Form Fields', step.request.form) });
        }

        let activeTab = tabs[0].id;

        function drawTabs() {
            tabsBar.getElement().innerHTML = '';
            tabs.forEach((tab) => {
                const tabButton = new Button(tab.label)
                    .setStyle(Style.Key.PADDING, '6px 10px')
                    .setStyle(Style.Key.BORDER, '1px solid ' + (activeTab === tab.id ? '#2563eb' : '#d1d5db'))
                    .setStyle(Style.Key.BORDER_RADIUS, '8px')
                    .setStyle(Style.Key.BACKGROUND_COLOR, activeTab === tab.id ? '#eff6ff' : '#ffffff')
                    .setStyle(Style.Key.COLOR, activeTab === tab.id ? '#1d4ed8' : '#334155')
                    .setStyle(Style.Key.FONT_SIZE, '12px')
                    .setStyle(Style.Key.FONT_WEIGHT, '700')
                    .setStyle(Style.Key.CURSOR, Style.Value.POINTER)
                    .addEventListener('click', () => {
                        activeTab = tab.id;
                        drawTabs();
                        drawContent();
                    });
                tabsBar.addChild(tabButton);
            });
        }

        function drawContent() {
            tabContent.getElement().innerHTML = '';
            const tab = tabs.find((item) => item.id === activeTab);
            if (tab) tab.render();
        }

        function renderMeta() {
            const metaWrap = new VerticalLayout().setStyle(Style.Key.GAP, '8px');
            const rows = [
                ['Method', step.method],
                ['URL', step.url],
                ['Status', String(step.statusCode || 'NA')],
                ['Duration (ms)', String(step.durationMs || 0)],
                ['Result', step.ok ? 'PASS' : 'FAIL']
            ];

            rows.forEach(([k, v]) => {
                metaWrap.addChild(
                    new HorizontalLayout()
                        .setStyle(Style.Key.GAP, '8px')
                        .addChildren(
                            new Div().setText(k).setStyle(Style.Key.WIDTH, '130px').setStyle(Style.Key.FONT_SIZE, '12px').setStyle(Style.Key.FONT_WEIGHT, '700').setStyle(Style.Key.COLOR, '#475569'),
                            new Div().setText(v).setStyle(Style.Key.FONT_SIZE, '12px').setStyle(Style.Key.COLOR, '#0f172a').setStyle(Style.Key.WORD_BREAK, 'break-all')
                        )
                );
            });

            tabContent.addChild(metaWrap);
        }

        function renderCodeSection(title, content) {
            tabContent.addChildren(sectionTitle(title), codeBlock(content));
        }

        drawTabs();
        drawContent();
    }

    function selectStep(selectedIndex) {
        listRows.forEach((row, index) => {
            row
                .setStyle(Style.Key.BACKGROUND_COLOR, index === selectedIndex ? '#eff6ff' : '#ffffff')
                .setStyle(Style.Key.BORDER_LEFT, index === selectedIndex ? '3px solid #2563eb' : '3px solid transparent');
        });

        const step = steps[selectedIndex];
        if (!step) return;

        detailTitle.getElement().innerHTML = '';
        detailTitle.addChildren(methodPill(step.method), document.createTextNode(' ' + step.name));
        detailMeta.setText(`${step.url} | ${step.statusCode || 'NA'} | ${step.durationMs || 0} ms`);
        renderTabsForStep(step);
    }

    steps.forEach((step, index) => {
        const row = new Div()
            .setStyle(Style.Key.PADDING, '10px 10px 10px 12px')
            .setStyle(Style.Key.BORDER_BOTTOM, '1px solid #eef2f7')
            .setStyle(Style.Key.CURSOR, 'pointer')
            .setStyle(Style.Key.BORDER_LEFT, '3px solid transparent')
            .addEventListener('click', () => selectStep(index));

        const top = new HorizontalLayout().setStyle(Style.Key.JUSTIFY_CONTENT, 'space-between').setStyle(Style.Key.ALIGN_ITEMS, 'center');
        const left = new HorizontalLayout().setStyle(Style.Key.GAP, '6px').setStyle(Style.Key.ALIGN_ITEMS, 'center');
        left.addChildren(methodPill(step.method), new Div().setText(step.name).setStyle(Style.Key.FONT_SIZE, '12px').setStyle(Style.Key.FONT_WEIGHT, '600').setStyle(Style.Key.COLOR, '#0f172a'));
        top.addChildren(left, statusPill(step.statusCode || 'NA', step.ok));

        const bottom = new Div().setStyle(Style.Key.FONT_SIZE, '11px').setStyle(Style.Key.COLOR, '#64748b').setStyle(Style.Key.MARGIN_TOP, '6px').setStyle(Style.Key.WORD_BREAK, 'break-all').setText(`${step.url} | ${step.durationMs || 0} ms`);

        row.addChildren(top, bottom);
        listRows.push(row);
        listWrap.addChild(row);
    });

    if (steps.length > 0) {
        selectStep(0);
    } else {
        detailTitle.setText('No API steps available');
        detailMeta.setText('Run did not capture API logs.');
        tabContent.addChild(new Div().setText('No request/response details to display.').setStyle(Style.Key.FONT_SIZE, '13px').setStyle(Style.Key.COLOR, '#64748b'));
    }

    if (data.error) {
        const errorCard = new Div()
            .setStyle(Style.Key.BACKGROUND_COLOR, '#fef2f2')
            .setStyle(Style.Key.BORDER, '1px solid #fecaca')
            .setStyle(Style.Key.BORDER_RADIUS, '12px')
            .setStyle(Style.Key.PADDING, '12px')
            .setStyle(Style.Key.MARGIN_TOP, '12px');

        errorCard.addChildren(
            new Div().setText('Execution Error').setStyle(Style.Key.FONT_SIZE, '14px').setStyle(Style.Key.FONT_WEIGHT, '800').setStyle(Style.Key.COLOR, '#b91c1c'),
            new Div().setText(`${data.error.type || 'Error'}: ${data.error.message || 'Unknown error'}`).setStyle(Style.Key.MARGIN_TOP, '6px').setStyle(Style.Key.FONT_SIZE, '12px').setStyle(Style.Key.COLOR, '#7f1d1d'),
            codeBlock(String(data.error.stackTrace || ''))
                .setStyle(Style.Key.MARGIN_TOP, '8px')
                .setStyle(Style.Key.BACKGROUND_COLOR, '#fff')
        );

        page.addChild(errorCard);
    }
